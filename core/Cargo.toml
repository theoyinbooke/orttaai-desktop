[package]
name = "orttaai-core"
description = "The write-once cross-platform engine for Orttaai (Linux & Windows)."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
anyhow.workspace = true
thiserror.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
directories.workspace = true
rusqlite.workspace = true

# Real platform backends are optional so the default build stays fast and
# OS-agnostic. whisper.cpp (via whisper-rs) is the first wired, in Phase 1.
whisper-rs = { version = "0.16", optional = true }

[features]
default = []
whisper = ["dep:whisper-rs"]
# Coming next behind their own features: cpal-audio, injection, hotkey.

[dev-dependencies]
hound = "3.5"
