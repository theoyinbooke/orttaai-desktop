# Phase 1 adds the real platform backends behind features so the default build
# stays fast and OS-agnostic:
#   whisper    = ["dep:whisper-rs"]
#   cpal-audio = ["dep:cpal", "dep:rubato"]
#   injection  = ["dep:enigo", "dep:arboard"]
#   hotkey     = ["dep:global-hotkey", "dep:ashpd"]
[features]
default = []
