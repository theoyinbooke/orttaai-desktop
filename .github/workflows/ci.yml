name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast, OS-agnostic checks on the core (mock backends, no heavy native deps).
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  # Build the real backends (whisper.cpp + cpal audio) on every target to catch
  # API/build breaks. whisper.cpp compiles via cmake; cpal needs ALSA on Linux.
  build-backends:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux backend deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libxdo-dev
      - name: Build + test all backends
        run: |
          cargo build -p orttaai-cli --features full
          cargo test -p orttaai-core --features cpal-audio
          cargo test -p orttaai-core --features hotkey

  # Build the Tauri desktop shell (frontend + Rust) to catch UI/IPC breakage.
  build-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Tauri Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev
      - name: Build frontend
        working-directory: app
        run: |
          npm install
          npm run build
      - name: Build Tauri shell
        working-directory: app/src-tauri
        run: cargo build
