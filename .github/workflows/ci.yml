name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast, OS-agnostic checks on the core (mock backends, no heavy native deps).
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  # Build the real whisper.cpp backend on every target to catch API/build breaks.
  # (whisper.cpp is compiled via cmake; GitHub runners ship cmake + a C/C++ toolchain.)
  build-whisper:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build CLI with whisper backend
        run: cargo build -p orttaai-cli --features whisper

  # NOTE: cpal/injection/hotkey backends add their own jobs (with libasound2-dev,
  # libxdo-dev, etc.) as they land later in Phase 1.
