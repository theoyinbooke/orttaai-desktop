name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast, OS-agnostic checks on the core (mock backends, no heavy native deps).
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  # Build the real backends (whisper.cpp + cpal audio) on every target to catch
  # API/build breaks. whisper.cpp compiles via cmake; cpal needs ALSA on Linux.
  build-backends:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux audio deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Build + test backends
        run: |
          cargo build -p orttaai-cli --features "audio whisper"
          cargo test -p orttaai-core --features cpal-audio

  # NOTE: injection/hotkey backends add their own jobs (libxdo-dev, etc.) as they
  # land later in Phase 1.
