name: release-cuda

# GPU (CUDA, NVIDIA) builds are slow and heavyweight, so they are DECOUPLED from
# the main CPU release (release.yml): run this manually after the CPU release for
# a tag is published. It builds `--features cuda` and uploads `*-cuda.*` assets to
# that existing release.
#
# CUDA builds are intentionally NOT added to the updater's latest.json — the
# auto-updater stays on the portable CPU build (runs everywhere); NVIDIA users
# grab the `-cuda` download manually. The build only needs the CUDA toolkit, not
# a GPU/driver (that's a runtime requirement on the user's machine).
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Published release tag to attach CUDA builds to (e.g. v0.2.1)'
        required: true

jobs:
  cuda:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            libgtk-3-dev libasound2-dev libxdo-dev

      # nvcc + CUDA libs to compile ggml-cuda. No GPU/driver needed to build.
      # (First run may need the version/sub-packages tuned — CUDA CI is finicky.)
      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: '12.5.1'
          method: network
          sub-packages: '["nvcc","cudart","cublas","cublas_dev"]'

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Build CUDA bundles
        working-directory: app
        env:
          # Portable CPU fallback paths in the same binary (see release.yml).
          GGML_NATIVE: 'OFF'
          GGML_AVX512: 'OFF'
        run: npx tauri build --features cuda

      # Rename each bundle with a `-cuda` suffix (so it never collides with the
      # CPU release assets) and upload it to the existing release for the tag.
      - name: Upload CUDA assets (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: |
          shopt -s nullglob
          for f in app/src-tauri/target/release/bundle/appimage/*.AppImage \
                   app/src-tauri/target/release/bundle/deb/*.deb \
                   app/src-tauri/target/release/bundle/rpm/*.rpm; do
            base="$(basename "$f")"
            cuda="${base%.*}-cuda.${base##*.}"
            cp "$f" "/tmp/$cuda"
            gh release upload "$TAG" "/tmp/$cuda" --clobber --repo "$GITHUB_REPOSITORY"
          done

      - name: Upload CUDA assets (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: |
          shopt -s nullglob
          for f in app/src-tauri/target/release/bundle/nsis/*.exe \
                   app/src-tauri/target/release/bundle/msi/*.msi; do
            base="$(basename "$f")"
            cuda="${base%.*}-cuda.${base##*.}"
            cp "$f" "/tmp/$cuda"
            gh release upload "$TAG" "/tmp/$cuda" --clobber --repo "$GITHUB_REPOSITORY"
          done
